<!DOCTYPE html>
<html>
<head>
  <title>Primepixel Studio</title>

  <!-- IMPORTANT for mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    /* GLOBAL */
    body {
      margin: 0;
      background-color: #0f172a;
      color: #e2e8f0;
      font-family: Arial, sans-serif;
    }

    /* NAVBAR */
    .navbar {
      background: #020617;
      padding: 15px 30px;
      text-align: left;
      font-weight: bold;
    }

    /* CONTAINER (keeps everything centered) */
    .container {
      max-width: 800px;
      margin: auto;
      text-align: center;
      padding: 20px;
    }

    /* HERO */
    .hero {
      margin-top: 100px;
    }

    .hero h1 {
      font-size: 40px;
    }

    .hero p {
      color: #94a3b8;
      margin: 15px 0;
    }

    /* BUTTON */
    button {
      padding: 14px 30px;
      border-radius: 30px;
      border: none;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0ea5e9;
      transform: translateY(-3px);
    }

    /* SERVICES */
    .services {
      margin-top: 80px;
    }

    .service-box {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      width: 200px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    /* TRUST */
    .trust {
      margin-top: 80px;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .service-box {
        flex-direction: column;
        align-items: center;
      }

      .card {
        width: 80%;
      }
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    Primepixel Studio
  </div>

  <div class="container">

    <!-- HERO -->
    <div class="hero">
      <h1>We build modern websites for small businesses</h1>
      <p>Clean design. Fast delivery. Affordable price.</p>
      <button onclick="contact()">Contact Me</button>
    </div>

    <!-- SERVICES -->
    <div class="services">
      <h2>Our Services</h2>

      <div class="service-box">
        <div class="card">Business Website</div>
        <div class="card">Portfolio Website</div>
        <div class="card">Fast Delivery</div>
      </div>
    </div>

    <!-- TRUST -->
    <div class="trust">
      <h2>Why Choose Me</h2>
      <p>✔ Fast delivery</p>
      <p>✔ Clean and modern design</p>
      <p>✔ Affordable pricing</p>
    </div>

  </div>

  <!-- SCRIPT -->
  <script>
    function contact() {
      window.location.href = "https://wa.me/919400735630";
    }
  </script>

</body>
</html>
